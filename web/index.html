<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore o Brasil API</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="gradient-bg text-slate-200 p-6">

    <main class="max-w-7xl mx-auto py-10 px-4">
    
        <header class="relative mb-20 text-left">
            <span class="text-xs font-black tracking-[0.3em] text-emerald-400 uppercase">System v2.0 // Brasil Explorer</span>
            <h1 class="text-7xl font-black text-white italic uppercase leading-none mt-2">
                Brasil <span class="text-transparent" style="-webkit-text-stroke: 1.5px #fff;">Data</span>
            </h1>
            <div class="h-1 w-32 bg-yellow-400 mt-4"></div>
        </header>
    
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
            
            <aside class="lg:col-span-4 sticky top-10 space-y-8">
                <div class="neo-card p-6 bg-white/5">
                    <label class="block text-[10px] font-bold text-emerald-400 uppercase mb-4 tracking-widest">Aguardando Parâmetro de Busca</p>
                    <div class="space-y-4">
                        <input id="ufInput" type="text" maxlength="2" placeholder="UF" 
                               class="w-full bg-black/40 border-2 border-white/10 p-5 text-5xl font-black text-center text-white focus:border-yellow-400 outline-none transition-all placeholder:opacity-20">
                        <button id="btnExplorar" class="neo-button w-full bg-yellow-400 text-black font-black py-5 uppercase italic text-lg hover:bg-white">
                            Iniciar Varredura
                        </button>
                    </div>
                </div>
    
                <div class="neo-card p-6 bg-black/20 border-emerald-500/30">
                    <h3 class="text-emerald-400 font-bold text-sm mb-6 flex items-center gap-2">
                        <span class="animate-pulse">●</span> LOG_CAPITAIS_HISTORICAS
                    </h3>
                    <div id="resCapitaisPais" class="space-y-6 font-mono">
                        </div>
                </div>
            </aside>
    
            <section class="lg:col-span-8 min-h-[600px]">
                <div id="carregamento" class="h-full flex flex-col items-center justify-center border-2 border-dashed border-white/10 rounded-3xl p-20">
                    <div class="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                    <p class="text-slate-500 font-mono text-sm uppercase tracking-widest">Sincronizando com a API...</p>
                </div>
    
                <div id="resultadoArea" class="hidden space-y-8">
                    </div>
            </section>
        </div>
    </main>

    <script src="./script.js" defer></script>
</body>
</html>
