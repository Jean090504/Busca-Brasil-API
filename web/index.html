<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore o Brasil API</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body class="gradient-bg text-slate-200 p-6">

    <main class="max-w-6xl mx-auto">
        <header class="text-center mb-12">
            <h1 class="text-5xl font-extrabold bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400 mb-2">
                Busca Brasil
            </h1>
            <p class="text-slate-400">Consumindo dados em tempo real da sua API Node.js</p>
        </header>
    
        <div class="glass p-2 rounded-2xl flex items-center mb-12 max-w-2xl mx-auto focus-within:ring-2 ring-emerald-500/50 transition-all">
            <input id="ufInput" type="text" placeholder="Digite a UF (ex: SP, RJ, AC)..." 
                   class="bg-transparent w-full p-4 outline-none text-xl font-light uppercase tracking-widest pl-6">
            <button id="btnExplorar" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-4 px-8 rounded-xl transition-all active:scale-95">
                EXPLORAR
            </button>
        </div>
    
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <div id="resultadoArea" class="hidden lg:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
    
            <aside class="lg:col-span-1">
                <div class="glass p-8 rounded-3xl flex flex-col border-l-4 border-cyan-500 sticky top-6">
                    <h3 class="text-sm font-bold text-cyan-400 uppercase tracking-widest mb-8 italic flex items-center gap-2">
                        <span class="w-2 h-2 bg-cyan-500 rounded-full animate-pulse"></span>
                        Linha do Tempo: Capitais
                    </h3>
                    
                    <div id="resCapitaisPais" class="space-y-8">
                        </div>
                </div>
            </aside>
        </div>
    
        <div id="carregamento" class="text-center py-20 opacity-40">
            <p class="text-xl font-light italic">Aguardando sua próxima descoberta...</p>
        </div>
    </main>

    <script src="./script.js" defer></script>
</body>
</html>
